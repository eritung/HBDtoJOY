<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>彭筠喬生日快樂</title>
  <style>
    :root{
      --bg1:#fff9cf;
      --bg2:#ffe98d;
      --bg3:#ffd955;
      --text:#6d5717;
      --text-soft:rgba(109,87,23,.50);
      --paper:#fffdf8;
      --paper2:#f5f0e5;
      --metal1:#f7f7f7;
      --metal2:#dddddd;
      --metal3:#b7b7b7;
      --metal4:#878787;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
      color:var(--text);
      overflow:hidden;
      -webkit-tap-highlight-color:transparent;
      background:
        radial-gradient(circle at 14% 14%, rgba(255,255,255,.62), transparent 12%),
        radial-gradient(circle at 85% 10%, rgba(255,255,255,.48), transparent 16%),
        radial-gradient(circle at 82% 86%, rgba(255,255,255,.35), transparent 15%),
        linear-gradient(180deg, var(--bg1) 0%, #fff3a8 42%, var(--bg2) 72%, var(--bg3) 100%);
    }

    .shell{
      position:relative;
      min-height:100dvh;
      padding:max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
      display:grid;
      grid-template-rows:auto 1fr auto;
      place-items:center;
      overflow:hidden;
      isolation:isolate;
    }

    .floating{
      position:absolute;
      left:0;
      right:0;
      top:180px;
      bottom:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .floaty{
      position:absolute;
      opacity:.68;
      animation:drift linear infinite;
      filter:drop-shadow(0 6px 10px rgba(255,255,255,.22));
    }

    .floaty.flower{font-size:clamp(18px,4.6vw,28px)}
    .floaty.dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.75);
    }
    .floaty.spark{
      width:16px;
      height:6px;
      border-radius:999px;
      background:rgba(255,255,255,.56);
      transform:rotate(28deg);
    }

    @keyframes drift{
      0%{transform:translateY(110vh) rotate(0deg)}
      100%{transform:translateY(-18vh) rotate(360deg)}
    }

    .title{
      position:relative;
      z-index:2;
      text-align:center;
      width:min(92vw, 360px);
      padding-top:2px;
      padding-bottom:10px;
    }

    .title h1{
      margin:0;
      font-size:clamp(28px,7vw,40px);
      line-height:1.14;
      letter-spacing:.03em;
      color:#7b6118;
      text-shadow:0 2px 0 rgba(255,255,255,.5);
    }

    .subtitle{
      margin:8px 0 0;
      font-size:clamp(11px,3vw,14px);
      font-weight:300;
      letter-spacing:.14em;
      color:var(--text-soft);
      line-height:1.45;
    }

    .stage{
      position:relative;
      z-index:2;
      width:min(100%, 420px);
      height:min(79dvh, 790px);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:2px;
    }

    .printer-scene{
      position:relative;
      width:min(94vw, 360px);
      height:min(100%, 700px);
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
    }

    .hint-chip{
      position:absolute;
      left:50%;
      top:8px;
      transform:translateX(-50%);
      z-index:12;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.76);
      color:#7b6118;
      font-size:13px;
      font-weight:500;
      letter-spacing:.06em;
      white-space:nowrap;
      box-shadow:0 10px 22px rgba(166,128,20,.12);
      backdrop-filter:blur(8px);
      animation:hintFloat 1.8s ease-in-out infinite;
      transition:opacity .35s ease, transform .35s ease;
      pointer-events:none;
    }

    .opened .hint-chip{
      opacity:0;
      transform:translateX(-50%) translateY(-10px);
    }

    @keyframes hintFloat{
      0%,100%{ transform:translateX(-50%) translateY(0); }
      50%{ transform:translateX(-50%) translateY(-4px); }
    }

    .receipt-window{
      position:absolute;
      left:50%;
      top:286px;
      transform:translateX(-50%);
      width:78%;
      max-width:292px;
      height:430px;
      overflow:hidden;
      z-index:3;
      pointer-events:none;
    }

    .receipt{
      width:100%;
      background:var(--paper);
      border-radius:0 0 28px 28px;
      box-shadow:0 18px 36px rgba(139,106,16,.14);
      overflow:hidden;
      position:relative;
      transform:translateY(calc(-100% - 24px));
      transition:transform 1.12s cubic-bezier(.2,.88,.18,1);
    }

    .opened .receipt{
      transform:translateY(0);
    }

    .receipt::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:18px;
      background:
        linear-gradient(-45deg, transparent 8px, var(--paper) 0) bottom left/16px 18px repeat-x;
      pointer-events:none;
    }

    .receipt-inner{
      padding:16px 14px 34px;
      text-align:center;
    }

    .receipt-label{
      font-size:12px;
      letter-spacing:.22em;
      color:#8b742d;
      font-weight:700;
      margin-bottom:8px;
      text-align:center;
    }

    .receipt-line{
      border-top:2px dotted rgba(120,120,120,.48);
      margin:0 0 14px;
    }

    .receipt-image{
      width:100%;
      margin:0 auto 14px;
      background:#fff;
      border-radius:18px;
      padding:10px;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
    }

    .receipt-image img{
      display:block;
      width:100%;
      height:auto;
      border-radius:12px;
      margin:0 auto;
    }

    .receipt-title{
      margin:0 0 16px;
      font-size:20px;
      line-height:1.35;
      font-weight:900;
      color:#4a3a12;
      text-align:center;
      letter-spacing:.04em;
      word-break:break-word;
    }

    .barcode-wrap{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:4px;
    }

    .barcode-svg{
      display:block;
      width:74%;
      max-width:210px;
      height:auto;
      margin:0 auto;
    }

    .barcode-number{
      width:100%;
      text-align:center;
      font-size:12px;
      font-weight:500;
      letter-spacing:.2em;
      color:#7b6a38;
      margin:0 auto;
    }

    .paper-feed{
      position:absolute;
      left:50%;
      top:246px;
      transform:translateX(-50%);
      width:66%;
      max-width:228px;
      height:0;
      background:linear-gradient(180deg, #fffefb 0%, var(--paper2) 100%);
      border-radius:0 0 16px 16px;
      z-index:5;
      box-shadow:0 6px 12px rgba(0,0,0,.05);
      transition:height .65s cubic-bezier(.25,.86,.2,1) .08s;
      pointer-events:none;
    }

    .opened .paper-feed{
      height:40px;
    }

    .printer{
      position:absolute;
      left:50%;
      top:120px;
      transform:translateX(-50%);
      width:100%;
      height:170px;
      border-radius:28px;
      z-index:6;
      background:
        linear-gradient(180deg, var(--metal1) 0%, var(--metal2) 18%, var(--metal3) 55%, var(--metal4) 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.7),
        inset 0 -12px 18px rgba(0,0,0,.08),
        0 18px 34px rgba(76,76,76,.16);
      overflow:hidden;
    }

    .printer::before{
      content:"";
      position:absolute;
      left:20px;
      right:20px;
      top:14px;
      height:44px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.16));
      z-index:7;
    }

    /* 左上小燈：整齊成一直線 */
    .panel-dots{
      position:absolute;
      left:26px;
      top:30px;
      display:flex;
      gap:8px;
      z-index:8;
      align-items:center;
      justify-content:center;
    }

    .dot-light{
      width:9px;
      height:9px;
      border-radius:999px;
      box-shadow:0 0 8px rgba(255,255,255,.28);
    }

    .dot-light:nth-child(1){background:#cfc0ff}
    .dot-light:nth-child(2){background:#9fd3ff}
    .dot-light:nth-child(3){background:#ffffff}

    /* 四角螺絲縮小固定 */
    .screw{
      position:absolute;
      width:12px;
      height:12px;
      border-radius:999px;
      background:
        radial-gradient(circle at 35% 30%, #ffffff 0%, #e6e6e6 42%, #949494 100%);
      box-shadow:inset 0 1px 1px rgba(255,255,255,.75);
      z-index:8;
    }

    .s1{left:14px; top:14px}
    .s2{right:14px; top:14px}
    .s3{left:14px; bottom:14px}
    .s4{right:14px; bottom:14px}

    /* 水果置中放在上方高光區 */
    .fruit-row{
      position:absolute;
      left:50%;
      top:22px;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      z-index:8;
      align-items:center;
      justify-content:center;
      width:max-content;
      pointer-events:none;
    }

    .fruit-tag{
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      line-height:1;
      background:transparent;
      border:0;
      box-shadow:none;
      padding:0;
      min-width:auto;
      height:auto;
      filter:drop-shadow(0 3px 4px rgba(0,0,0,.06));
    }

    /* 出紙孔區只保留純粹結構 */
    .slot{
      position:absolute;
      left:50%;
      top:108px;
      transform:translateX(-50%);
      width:86%;
      height:18px;
      border-radius:999px;
      background:linear-gradient(180deg, #202020 0%, #4a4a4a 100%);
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.08),
        0 2px 0 rgba(255,255,255,.12);
      z-index:9;
      overflow:hidden;
    }

    .slot-paper{
      position:absolute;
      left:50%;
      top:116px;
      transform:translateX(-50%);
      width:64%;
      max-width:220px;
      height:0;
      background:linear-gradient(180deg, #fffefb 0%, var(--paper2) 100%);
      border-radius:0 0 10px 10px;
      z-index:8;
      transition:height .28s ease .02s;
      pointer-events:none;
    }

    .opened .slot-paper{
      height:14px;
    }

    .actions{
      margin-top:34px;
      padding-bottom:14px;
    }

    button{
      appearance:none;
      border:0;
      border-radius:999px;
      padding:12px 18px;
      font-size:14px;
      font-weight:600;
      color:#7a6218;
      background:rgba(255,248,219,.88);
      box-shadow:0 10px 24px rgba(166,128,20,.14);
      backdrop-filter:blur(10px);
      cursor:pointer;
    }

    button:active{transform:scale(.98)}

    canvas#confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:20;
    }

    @media (max-width:380px){
      .floating{ top:170px; }

      .title h1{font-size:26px}
      .subtitle{font-size:11px}

      .hint-chip{
        top:4px;
        font-size:12px;
        padding:9px 14px;
      }

      .printer-scene{
        width:min(95vw, 350px);
        height:min(100%, 680px);
      }

      .printer{
        top:122px;
        height:160px;
      }

      .panel-dots{
        left:24px;
        top:28px;
      }

      .fruit-row{
        top:22px;
      }

      .fruit-tag{
        font-size:26px;
      }

      .slot{ top:102px; }
      .slot-paper{ top:110px; }

      .paper-feed{
        top:246px;
        width:68%;
      }

      .receipt-window{
        top:284px;
        width:80%;
        height:420px;
      }

      .receipt-title{font-size:18px}
      .barcode-number{font-size:11px}
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="shell" id="shell">
    <div class="floating" id="floating" aria-hidden="true"></div>

    <header class="title">
      <h1>彭筠喬生日快樂</h1>
      <p class="subtitle">恭賀小喬35歲青春大壽！</p>
    </header>

    <main class="stage">
      <div class="printer-scene" id="trigger" role="button" aria-label="展開生日卡片">
        <div class="hint-chip">點擊畫面展開卡片 ✨</div>

        <div class="receipt-window">
          <div class="receipt">
            <div class="receipt-inner">
              <div class="receipt-label">HAPPY BIRTHDAY</div>
              <div class="receipt-line"></div>

              <div class="receipt-image">
                <img src="./birthday-card.png" alt="彭筠喬生日卡片">
              </div>

              <div class="receipt-line"></div>

              <h2 class="receipt-title">彭筠喬生日快樂</h2>

              <div class="barcode-wrap">
                <svg class="barcode-svg" viewBox="0 0 220 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="0" y="0" width="220" height="34" fill="transparent"/>
                  <g fill="#4a4a4a">
                    <rect x="8" y="2" width="3" height="30"/>
                    <rect x="15" y="2" width="2" height="30"/>
                    <rect x="22" y="2" width="5" height="30"/>
                    <rect x="31" y="2" width="2" height="30"/>
                    <rect x="38" y="2" width="3" height="30"/>
                    <rect x="46" y="2" width="6" height="30"/>
                    <rect x="56" y="2" width="2" height="30"/>
                    <rect x="63" y="2" width="4" height="30"/>
                    <rect x="72" y="2" width="2" height="30"/>
                    <rect x="79" y="2" width="6" height="30"/>
                    <rect x="89" y="2" width="3" height="30"/>
                    <rect x="96" y="2" width="2" height="30"/>
                    <rect x="103" y="2" width="5" height="30"/>
                    <rect x="112" y="2" width="2" height="30"/>
                    <rect x="119" y="2" width="4" height="30"/>
                    <rect x="127" y="2" width="2" height="30"/>
                    <rect x="134" y="2" width="6" height="30"/>
                    <rect x="144" y="2" width="3" height="30"/>
                    <rect x="151" y="2" width="2" height="30"/>
                    <rect x="158" y="2" width="5" height="30"/>
                    <rect x="167" y="2" width="2" height="30"/>
                    <rect x="174" y="2" width="4" height="30"/>
                    <rect x="182" y="2" width="2" height="30"/>
                    <rect x="189" y="2" width="6" height="30"/>
                    <rect x="199" y="2" width="3" height="30"/>
                    <rect x="206" y="2" width="2" height="30"/>
                  </g>
                </svg>
                <div class="barcode-number">2026.04.26</div>
              </div>
            </div>
          </div>
        </div>

        <div class="paper-feed"></div>

        <div class="printer">
          <div class="screw s1"></div>
          <div class="screw s2"></div>
          <div class="screw s3"></div>
          <div class="screw s4"></div>

          <div class="panel-dots">
            <div class="dot-light"></div>
            <div class="dot-light"></div>
            <div class="dot-light"></div>
          </div>

          <div class="fruit-row" aria-hidden="true">
            <div class="fruit-tag">🫐</div>
            <div class="fruit-tag">🍇</div>
          </div>

          <div class="slot-paper"></div>
          <div class="slot" id="slot"></div>
        </div>
      </div>
    </main>

    <div class="actions">
      <button id="againBtn" type="button">再噴一次彩帶</button>
    </div>
  </div>

  <script>
    const shell = document.getElementById('shell');
    const trigger = document.getElementById('trigger');
    const againBtn = document.getElementById('againBtn');
    const floating = document.getElementById('floating');
    const slot = document.getElementById('slot');

    let opened = false;

    const floatItems = ['🫐','🍇','💛','✨','⭐'];
    for (let i = 0; i < 16; i++) {
      const el = document.createElement('div');
      const type = i % 3;

      if (type === 0) {
        el.className = 'floaty flower';
        el.textContent = floatItems[i % floatItems.length];
      } else if (type === 1) {
        el.className = 'floaty dot';
      } else {
        el.className = 'floaty spark';
      }

      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (9 + Math.random() * 8) + 's';
      el.style.animationDelay = (-Math.random() * 12) + 's';
      el.style.opacity = (0.30 + Math.random() * 0.38).toFixed(2);
      floating.appendChild(el);
    }

    function openCard() {
      if (!opened) {
        opened = true;
        shell.classList.add('opened');
      }
      const rect = slot.getBoundingClientRect();
      launchConfetti(
        160,
        rect.left + rect.width / 2,
        rect.top + rect.height / 2
      );
    }

    trigger.addEventListener('click', openCard);

    againBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const rect = slot.getBoundingClientRect();
      launchConfetti(140, rect.left + rect.width / 2, rect.top + rect.height / 2);
    });

    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let pieces = [];
    let rafId = null;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function launchConfetti(count = 120, originX = window.innerWidth / 2, originY = window.innerHeight * 0.3) {
      resizeCanvas();
      const colors = ['#b89af7', '#d8c8ff', '#9fcfff', '#d7ecff', '#ffffff', '#ffd955'];

      for (let i = 0; i < count; i++) {
        pieces.push({
          x: originX + rand(-26, 26),
          y: originY + rand(-6, 6),
          w: rand(6, 12),
          h: rand(8, 18),
          vx: rand(-5.5, 5.5),
          vy: rand(-10, 1.5),
          g: rand(0.14, 0.24),
          rot: rand(0, Math.PI * 2),
          vr: rand(-0.25, 0.25),
          color: colors[Math.floor(Math.random() * colors.length)],
          alpha: 1
        });
      }

      if (!rafId) animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      pieces.forEach((p) => {
        p.vy += p.g;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;
        if (p.y > window.innerHeight * 0.92) p.alpha -= 0.03;

        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });

      pieces = pieces.filter(p => p.alpha > 0 && p.y < window.innerHeight + 40);

      if (pieces.length) {
        rafId = requestAnimationFrame(animateConfetti);
      } else {
        rafId = null;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }
    }
  </script>
</body>
</html>
