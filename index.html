<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>彭筠喬生日快樂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#fffbe8;
      --bg2:#ffe98d;
      --bg3:#f5c842;
      --text:#5c4a10;
      --text-soft:rgba(92,74,16,.45);
      --paper:#fffef9;
      --paper2:#f2ecdc;
      --gold1:#f7c948;
      --gold2:#e0a820;
      --metal1:#f9f9f9;
      --metal2:#e6e6e6;
      --metal3:#c0c0c0;
      --metal4:#909090;
      --accent:#b48af0;
      --accent2:#8fc8ff;
      --radius-printer:24px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0}

    body{
      font-family:"Noto Serif TC","PingFang TC","Microsoft JhengHei",serif;
      color:var(--text);
      overflow:hidden;
      background:
        radial-gradient(ellipse 80% 50% at 12% 8%, rgba(255,255,255,.72), transparent),
        radial-gradient(ellipse 60% 40% at 88% 6%, rgba(255,255,255,.52), transparent),
        radial-gradient(ellipse 55% 35% at 78% 92%, rgba(255,220,80,.4), transparent),
        radial-gradient(ellipse 45% 30% at 18% 88%, rgba(255,255,255,.28), transparent),
        linear-gradient(175deg, var(--bg1) 0%, #fff5b2 35%, var(--bg2) 68%, var(--bg3) 100%);
    }

    /* ── Noise grain overlay ── */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size:180px 180px;
      opacity:.028;
      pointer-events:none;
      z-index:0;
    }

    .shell{
      position:relative;
      height:100svh;
      height:100dvh;
      padding:
        max(16px, calc(env(safe-area-inset-top) + 8px))
        16px
        max(16px, calc(env(safe-area-inset-bottom) + 8px));
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:0;
      overflow:hidden;
      isolation:isolate;
    }

    /* ── Floating ambient particles ── */
    .floating{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .floaty{
      position:absolute;
      opacity:.6;
      animation:drift linear infinite;
      filter:drop-shadow(0 4px 8px rgba(255,255,255,.3));
    }
    .floaty.flower{font-size:clamp(16px,4vw,24px)}
    .floaty.dot{
      width:6px;height:6px;border-radius:50%;
      background:rgba(255,255,255,.8);
    }
    .floaty.spark{
      width:14px;height:5px;border-radius:999px;
      background:rgba(255,255,255,.6);
      transform:rotate(32deg);
    }
    @keyframes drift{
      0%{transform:translateY(108vh) rotate(0deg) scale(1)}
      50%{transform:translateY(50vh) rotate(180deg) scale(1.05)}
      100%{transform:translateY(-12vh) rotate(360deg) scale(1)}
    }

    /* ── Header ── */
    .title{
      position:relative;z-index:2;
      text-align:center;
      width:min(92vw,360px);
      flex-shrink:0;
      padding:4px 0 6px;
    }

    .title h1{
      margin:0;
      font-family:"DM Serif Display","Noto Serif TC",serif;
      font-size:clamp(24px,6.5vw,36px);
      line-height:1.12;
      letter-spacing:.04em;
      color:#5c4510;
      text-shadow:
        0 1px 0 rgba(255,255,255,.7),
        0 3px 10px rgba(180,140,20,.15);
    }

    .subtitle{
      margin:5px 0 0;
      font-size:clamp(10px,2.6vw,12.5px);
      font-weight:400;
      letter-spacing:.18em;
      color:var(--text-soft);
      line-height:1.5;
      font-family:"Noto Serif TC",serif;
    }

    /* ── Stage (middle flex) ── */
    .stage{
      position:relative;z-index:2;
      flex:1 1 auto;
      min-height:0;
      width:min(100%,420px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    /* ── Printer scene ── */
    .printer-scene{
      position:relative;
      width:min(88vw,340px);
      height:min(100%,620px);
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
    }

    /* ── Hint chip ── */
    .hint-chip{
      position:absolute;
      left:50%;top:-2px;
      transform:translateX(-50%);
      z-index:12;
      padding:9px 18px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      color:#7a5f1a;
      font-size:12.5px;
      font-weight:700;
      letter-spacing:.08em;
      white-space:nowrap;
      box-shadow:
        0 8px 20px rgba(160,120,10,.12),
        inset 0 1px 0 rgba(255,255,255,.9);
      backdrop-filter:blur(12px);
      animation:hintFloat 2s ease-in-out infinite;
      transition:opacity .4s ease, transform .4s ease;
      pointer-events:none;
      border:1px solid rgba(255,230,100,.5);
    }

    .opened .hint-chip{
      opacity:0;
      transform:translateX(-50%) translateY(-8px);
      pointer-events:none;
    }

    @keyframes hintFloat{
      0%,100%{transform:translateX(-50%) translateY(0)}
      50%{transform:translateX(-50%) translateY(-5px)}
    }

    /* ── Receipt window ── */
    .receipt-window{
      position:absolute;
      left:50%;
      top:clamp(200px, 210px, 220px);
      transform:translateX(-50%);
      width:78%;max-width:284px;
      height:min(56svh, 370px);
      overflow:hidden;
      z-index:3;
      pointer-events:none;
    }

    .receipt{
      width:100%;
      background:var(--paper);
      border-radius:0 0 22px 22px;
      box-shadow:
        0 20px 40px rgba(120,90,10,.16),
        0 4px 8px rgba(0,0,0,.06);
      overflow:hidden;
      position:relative;
      transform:translateY(calc(-100% - 28px));
      transition:transform 1.1s cubic-bezier(.18,.9,.16,1);
    }

    .opened .receipt{
      transform:translateY(0);
    }

    /* Zigzag bottom edge */
    .receipt::after{
      content:"";
      position:absolute;
      left:0;right:0;bottom:0;height:16px;
      background:linear-gradient(-45deg, transparent 6px, var(--paper) 0) bottom left/14px 16px repeat-x;
      pointer-events:none;
      z-index:2;
    }

    .receipt-inner{
      padding:14px 12px 30px;
      text-align:center;
    }

    .receipt-label{
      font-size:10px;
      letter-spacing:.3em;
      color:#a08530;
      font-weight:700;
      margin-bottom:6px;
      font-family:"DM Serif Display",serif;
    }

    .receipt-line{
      border-top:1.5px dashed rgba(160,130,60,.35);
      margin:0 0 12px;
    }

    .receipt-image{
      width:100%;
      margin:0 auto 12px;
      background:#fff;
      border-radius:14px;
      padding:8px;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.05),
        0 2px 8px rgba(0,0,0,.06);
    }

    .receipt-image img{
      display:block;
      width:100%;height:auto;
      border-radius:8px;
    }

    .receipt-title{
      margin:0 0 14px;
      font-family:"Noto Serif TC",serif;
      font-size:18px;
      line-height:1.4;
      font-weight:900;
      color:#3e2e08;
      letter-spacing:.06em;
      word-break:break-word;
    }

    .barcode-wrap{
      width:100%;
      display:flex;flex-direction:column;
      align-items:center;gap:6px;
      margin-top:2px;
    }

    .barcode-svg{
      display:block;width:72%;max-width:200px;
      height:auto;margin:0 auto;
      opacity:.7;
    }

    .barcode-number{
      font-size:10.5px;font-weight:600;
      letter-spacing:.22em;color:#8a7440;
      font-family:monospace;
    }

    /* ── Paper feed strip ── */
    .paper-feed{
      position:absolute;
      left:50%;top:clamp(160px,172px,180px);
      transform:translateX(-50%);
      width:64%;max-width:220px;
      height:0;
      background:linear-gradient(180deg,#fffefb 0%,var(--paper2) 100%);
      border-radius:0 0 12px 12px;
      z-index:5;
      box-shadow:0 4px 8px rgba(0,0,0,.04);
      transition:height .6s cubic-bezier(.25,.86,.2,1) .06s;
      pointer-events:none;
    }

    .opened .paper-feed{height:38px}

    /* ── Printer body ── */
    .printer{
      position:absolute;
      left:50%;top:44px;
      transform:translateX(-50%);
      width:100%;height:158px;
      border-radius:var(--radius-printer);
      z-index:6;
      background:
        linear-gradient(165deg,
          #fefefe 0%,
          #ebebeb 20%,
          #d8d8d8 50%,
          #b8b8b8 75%,
          #989898 100%
        );
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.85),
        inset 0 -2px 0 rgba(0,0,0,.08),
        inset -2px 0 0 rgba(0,0,0,.04),
        0 12px 28px rgba(60,60,60,.18),
        0 4px 8px rgba(0,0,0,.1),
        0 1px 0 rgba(255,255,255,.6);
      overflow:visible;
    }

    /* Top sheen */
    .printer::before{
      content:"";
      position:absolute;
      left:16px;right:16px;top:12px;
      height:40px;border-radius:999px;
      background:linear-gradient(180deg,
        rgba(255,255,255,.72) 0%,
        rgba(255,255,255,.18) 60%,
        transparent 100%
      );
      z-index:7;pointer-events:none;
    }

    /* Bottom bevel */
    .printer::after{
      content:"";
      position:absolute;
      left:0;right:0;bottom:0;height:28px;
      border-radius:0 0 var(--radius-printer) var(--radius-printer);
      background:linear-gradient(180deg,transparent,rgba(0,0,0,.06));
      pointer-events:none;
    }

    /* Screws */
    .screw{
      position:absolute;
      width:11px;height:11px;
      border-radius:50%;
      background:radial-gradient(circle at 32% 28%,#fff 0%,#e0e0e0 40%,#8a8a8a 100%);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.8),
        0 1px 2px rgba(0,0,0,.15);
      z-index:8;
    }
    .screw::after{
      content:"";
      position:absolute;
      inset:2px;border-radius:50%;
      background:transparent;
      border-top:1px solid rgba(0,0,0,.2);
      transform:rotate(-45deg);
    }

    .s1{left:12px;top:12px}
    .s2{right:12px;top:12px}
    .s3{left:12px;bottom:12px}
    .s4{right:12px;bottom:12px}

    /* Status dots */
    .panel-dots{
      position:absolute;
      left:24px;top:28px;
      display:flex;gap:7px;
      z-index:8;align-items:center;
    }

    .dot-light{
      width:8px;height:8px;border-radius:50%;
      box-shadow:0 0 6px currentColor;
    }
    .dot-light:nth-child(1){
      background:#c8b4ff;color:#c8b4ff;
      animation:blink 3.2s ease-in-out infinite;
    }
    .dot-light:nth-child(2){
      background:#9fcfff;color:#9fcfff;
      animation:blink 3.2s ease-in-out infinite .8s;
    }
    .dot-light:nth-child(3){
      background:#ffffff;color:rgba(255,255,255,.6);
    }

    @keyframes blink{
      0%,90%,100%{opacity:1}
      95%{opacity:.25}
    }

    /* Emoji fruits */
    .fruit-row{
      position:absolute;
      left:50%;top:20px;
      transform:translateX(-50%);
      display:flex;gap:10px;
      z-index:8;
      align-items:center;
      width:max-content;
      pointer-events:none;
    }

    .fruit-tag{
      font-size:clamp(24px,5vw,30px);
      line-height:1;
      filter:
        drop-shadow(0 2px 6px rgba(0,0,0,.1))
        drop-shadow(0 0 12px rgba(255,255,255,.4));
      animation:fruitFloat 4s ease-in-out infinite;
    }
    .fruit-tag:nth-child(2){animation-delay:-.8s}

    @keyframes fruitFloat{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-3px)}
    }

    /* Slot */
    .slot{
      position:absolute;
      left:50%;top:100px;
      transform:translateX(-50%);
      width:84%;height:16px;
      border-radius:999px;
      background:linear-gradient(180deg,#1a1a1a 0%,#444 100%);
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,.5),
        inset 0 1px 2px rgba(255,255,255,.05),
        0 2px 0 rgba(255,255,255,.15);
      z-index:9;overflow:hidden;
    }

    .slot-paper{
      position:absolute;
      left:50%;top:108px;
      transform:translateX(-50%);
      width:62%;max-width:210px;
      height:0;
      background:linear-gradient(180deg,#fffefb,var(--paper2));
      border-radius:0 0 8px 8px;
      z-index:8;
      transition:height .26s ease .02s;
      pointer-events:none;
    }
    .opened .slot-paper{height:12px}

    /* ── Bottom action area ── */
    .actions{
      flex-shrink:0;
      position:relative;z-index:2;
      width:100%;
      display:flex;
      justify-content:center;
      padding:6px 0 4px;
    }

    .confetti-btn{
      appearance:none;border:0;
      border-radius:999px;
      padding:11px 22px;
      font-size:13.5px;
      font-weight:700;
      letter-spacing:.06em;
      font-family:"Noto Serif TC",serif;
      color:#6a5015;
      background:
        linear-gradient(170deg,rgba(255,252,220,.95),rgba(255,235,140,.9));
      box-shadow:
        0 8px 20px rgba(160,120,10,.18),
        0 2px 4px rgba(160,120,10,.12),
        inset 0 1px 0 rgba(255,255,255,.9),
        inset 0 -1px 0 rgba(160,120,10,.1);
      cursor:pointer;
      border:1px solid rgba(220,180,60,.4);
      transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .confetti-btn:hover{
      background:linear-gradient(170deg,rgba(255,252,230,1),rgba(255,240,160,.95));
      box-shadow:
        0 12px 26px rgba(160,120,10,.22),
        0 3px 6px rgba(160,120,10,.14),
        inset 0 1px 0 rgba(255,255,255,.95);
      transform:translateY(-1px);
    }

    .confetti-btn:active{
      transform:scale(.97) translateY(0);
      box-shadow:
        0 4px 10px rgba(160,120,10,.14),
        inset 0 1px 0 rgba(255,255,255,.8);
    }

    /* ── Confetti canvas ── */
    canvas#confetti{
      position:fixed;inset:0;
      pointer-events:none;z-index:20;
    }

    /* ── Small phone adjustments ── */
    @media(max-width:380px){
      .title h1{font-size:22px}
      .subtitle{font-size:10px}
      .hint-chip{font-size:11.5px;padding:8px 14px}

      .printer-scene{
        width:min(94vw,330px);
        height:min(100%,580px);
      }

      .printer{top:34px;height:148px}
      .slot{top:90px}
      .slot-paper{top:98px}

      .paper-feed{top:clamp(148px,158px,164px)}
      .receipt-window{top:clamp(182px,192px,200px)}
      .receipt-title{font-size:16px}
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="shell" id="shell">
    <div class="floating" id="floating" aria-hidden="true"></div>

    <header class="title">
      <h1>彭筠喬生日快樂</h1>
      <p class="subtitle">恭賀小喬 35 歲青春大壽</p>
    </header>

    <main class="stage">
      <div class="printer-scene" id="trigger" role="button" aria-label="展開生日卡片">

        <div class="hint-chip">點擊畫面展開卡片 ✨</div>

        <div class="receipt-window">
          <div class="receipt">
            <div class="receipt-inner">
              <div class="receipt-label">✦ HAPPY BIRTHDAY ✦</div>
              <div class="receipt-line"></div>

              <div class="receipt-image">
                <img src="./birthday-card.png" alt="彭筠喬生日卡片">
              </div>

              <div class="receipt-line"></div>

              <h2 class="receipt-title">彭筠喬生日快樂</h2>

              <div class="barcode-wrap">
                <svg class="barcode-svg" viewBox="0 0 220 34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="0" y="0" width="220" height="34" fill="transparent"/>
                  <g fill="#4a4a4a">
                    <rect x="8"   y="2" width="3"  height="30"/>
                    <rect x="15"  y="2" width="2"  height="30"/>
                    <rect x="22"  y="2" width="5"  height="30"/>
                    <rect x="31"  y="2" width="2"  height="30"/>
                    <rect x="38"  y="2" width="3"  height="30"/>
                    <rect x="46"  y="2" width="6"  height="30"/>
                    <rect x="56"  y="2" width="2"  height="30"/>
                    <rect x="63"  y="2" width="4"  height="30"/>
                    <rect x="72"  y="2" width="2"  height="30"/>
                    <rect x="79"  y="2" width="6"  height="30"/>
                    <rect x="89"  y="2" width="3"  height="30"/>
                    <rect x="96"  y="2" width="2"  height="30"/>
                    <rect x="103" y="2" width="5"  height="30"/>
                    <rect x="112" y="2" width="2"  height="30"/>
                    <rect x="119" y="2" width="4"  height="30"/>
                    <rect x="127" y="2" width="2"  height="30"/>
                    <rect x="134" y="2" width="6"  height="30"/>
                    <rect x="144" y="2" width="3"  height="30"/>
                    <rect x="151" y="2" width="2"  height="30"/>
                    <rect x="158" y="2" width="5"  height="30"/>
                    <rect x="167" y="2" width="2"  height="30"/>
                    <rect x="174" y="2" width="4"  height="30"/>
                    <rect x="182" y="2" width="2"  height="30"/>
                    <rect x="189" y="2" width="6"  height="30"/>
                    <rect x="199" y="2" width="3"  height="30"/>
                    <rect x="206" y="2" width="2"  height="30"/>
                  </g>
                </svg>
                <div class="barcode-number">2026 · 04 · 26</div>
              </div>
            </div>
          </div>
        </div>

        <div class="paper-feed"></div>

        <div class="printer">
          <div class="screw s1"></div>
          <div class="screw s2"></div>
          <div class="screw s3"></div>
          <div class="screw s4"></div>

          <div class="panel-dots">
            <div class="dot-light"></div>
            <div class="dot-light"></div>
            <div class="dot-light"></div>
          </div>

          <div class="fruit-row" aria-hidden="true">
            <div class="fruit-tag">🫐</div>
            <div class="fruit-tag">🍇</div>
          </div>

          <div class="slot-paper"></div>
          <div class="slot" id="slot"></div>
        </div>

      </div>
    </main>

    <div class="actions">
      <button id="againBtn" class="confetti-btn" type="button">🎊 再噴一次彩帶</button>
    </div>
  </div>

  <script>
    const shell    = document.getElementById('shell');
    const trigger  = document.getElementById('trigger');
    const againBtn = document.getElementById('againBtn');
    const floating = document.getElementById('floating');
    const slot     = document.getElementById('slot');

    let opened = false;

    // Floating ambient particles
    const items = ['🫐','🍇','💛','✨','⭐','🌟'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      const type = i % 3;
      if (type === 0) {
        el.className = 'floaty flower';
        el.textContent = items[i % items.length];
      } else if (type === 1) {
        el.className = 'floaty dot';
      } else {
        el.className = 'floaty spark';
      }
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration  = (10 + Math.random() * 9) + 's';
      el.style.animationDelay     = (-Math.random() * 14) + 's';
      el.style.opacity            = (0.25 + Math.random() * 0.35).toFixed(2);
      floating.appendChild(el);
    }

    // Open card
    function openCard() {
      if (!opened) {
        opened = true;
        shell.classList.add('opened');
      }
      const r = slot.getBoundingClientRect();
      launchConfetti(160, r.left + r.width / 2, r.top + r.height / 2);
    }

    trigger.addEventListener('click', openCard);

    againBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const r = slot.getBoundingClientRect();
      launchConfetti(150, r.left + r.width / 2, r.top + r.height / 2);
    });

    // Confetti engine
    const canvas = document.getElementById('confetti');
    const ctx    = canvas.getContext('2d');
    let pieces   = [];
    let rafId    = null;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = Math.floor(window.innerWidth  * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function rand(a, b) { return Math.random() * (b - a) + a; }

    function launchConfetti(count = 120, ox = window.innerWidth / 2, oy = window.innerHeight * 0.3) {
      resizeCanvas();
      const colors = ['#c9b2ff','#e0d4ff','#9fcfff','#d7ecff','#ffffff','#ffd955','#ffb347','#ffe4a0'];
      const shapes = ['rect','circle','rect'];

      for (let i = 0; i < count; i++) {
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        pieces.push({
          x: ox + rand(-28, 28),
          y: oy + rand(-6, 6),
          w: rand(5, 11),
          h: rand(7, 16),
          vx: rand(-6, 6),
          vy: rand(-11, 1),
          g: rand(0.13, 0.22),
          rot: rand(0, Math.PI * 2),
          vr: rand(-0.28, 0.28),
          color: colors[Math.floor(Math.random() * colors.length)],
          alpha: 1,
          shape,
        });
      }

      if (!rafId) animateConfetti();
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      pieces.forEach(p => {
        p.vy += p.g;
        p.x  += p.vx;
        p.y  += p.vy;
        p.rot += p.vr;
        if (p.y > window.innerHeight * 0.88) p.alpha -= 0.025;

        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;

        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        }

        ctx.restore();
      });

      pieces = pieces.filter(p => p.alpha > 0 && p.y < window.innerHeight + 50);

      if (pieces.length) {
        rafId = requestAnimationFrame(animateConfetti);
      } else {
        rafId = null;
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }
    }
  </script>
